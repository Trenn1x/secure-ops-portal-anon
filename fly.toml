app = "secure-ops-portal"
primary_region = "ewr"

[build]

[env]
  PORT = "8000"
  DATABASE_PATH = "/data/ops_portal.db"

[[mounts]]
  source = "ops_portal_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
